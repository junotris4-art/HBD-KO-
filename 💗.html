<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galaxia de Amor</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #instruction {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            color: rgba(255, 30, 30, 0.45);
            font-size: 11px;
            pointer-events: none;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 10;
        }
        /* Tap Particle Styles */
        .emoji-particle {
            position: absolute;
            pointer-events: none;
            z-index: 9999;
            font-size: 24px;
            filter: drop-shadow(0 0 8px rgba(255, 20, 20, 0.6));
            animation: floatUp 1.4s ease-out forwards;
        }
        @keyframes floatUp {
            0% {
                transform: translate(-50%, -50%) translate(0, 0) scale(0.4) rotate(0deg);
                opacity: 1;
            }
            15% {
                transform: translate(-50%, -50%) translate(var(--mx), var(--my)) scale(1.2) rotate(var(--rot));
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) translate(calc(var(--mx) * 1.8), calc(var(--my) - 150px)) scale(0.6) rotate(calc(var(--rot) * 2));
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="instruction">Tap to release hearts</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 1. SCENE & CAMERA ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 7.5, 18); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // --- 2. ULTRA-FINE GLOWING DUST TEXTURE ---
        const createFineDustTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');      
            gradient.addColorStop(0.2, 'rgba(255, 20, 20, 0.9)');    
            gradient.addColorStop(0.6, 'rgba(120, 0, 0, 0.25)');     
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        };
        const fineDustTexture = createFineDustTexture();

        // --- 3. THE COMPACT DUST HEART ---
        const heartGeometry = new THREE.BufferGeometry();
        const positions = [];

        const heartScale = 0.25; 
        const yCenterOffset = 2.0;

        const borderPoints = 2500;
        for (let i = 0; i < borderPoints; i++) {
            const t = (i / borderPoints) * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            
            const px = x * heartScale + (Math.random() - 0.5) * 0.12;
            const py = (y + yCenterOffset) * heartScale + (Math.random() - 0.5) * 0.12;
            const pz = (Math.random() - 0.5) * 0.2;
            positions.push(px, py, pz);
        }

        const insidePoints = 3000;
        for (let i = 0; i < insidePoints; i++) {
            const t = Math.random() * Math.PI * 2;
            const r = Math.sqrt(Math.random()); 
            
            const x = 16 * Math.pow(Math.sin(t), 3) * r;
            const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * r;
            
            const px = x * heartScale + (Math.random() - 0.5) * 0.2;
            const py = (y + yCenterOffset) * heartScale + (Math.random() - 0.5) * 0.2;
            const pz = (Math.random() - 0.5) * 0.6; 
            positions.push(px, py, pz);
        }

        heartGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

        const heartMaterial = new THREE.PointsMaterial({
            size: 0.24,
            map: fineDustTexture,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            color: 0xff1e1e
        });

        const dustHeart = new THREE.Points(heartGeometry, heartMaterial);
        dustHeart.position.y = 3.2; 
        scene.add(dustHeart);

        // --- 4. SWIRLING ACCRETION DISK (GALAXY ARMS WIDER AT THE END) ---
        const galaxyParticleCount = 8500; 
        const galaxyGeometry = new THREE.BufferGeometry();
        const galaxyPositions = new Float32Array(galaxyParticleCount * 3);
        const galaxyColors = new Float32Array(galaxyParticleCount * 3);

        const deepRed = new THREE.Color('#7a0000');
        const brightRed = new THREE.Color('#ff1a1a');
        const pinkGlow = new THREE.Color('#ff5e7e');

        const innerHorizonLimit = 1.8; 

        for (let i = 0; i < galaxyParticleCount; i++) {
            const r = innerHorizonLimit + Math.pow(Math.random(), 2.2) * 14; 
            
            const arms = 5; 
            const armOffset = (i % arms) * ((2 * Math.PI) / arms);
            
            const armDispersion = (Math.random() - 0.5) * (0.08 + r * 0.065);
            const theta = r * 0.48 + armOffset + armDispersion; 

            const x = Math.cos(theta) * r;
            const z = Math.sin(theta) * r;
            const y = (Math.random() - 0.5) * 0.3 - 2.5; 

            galaxyPositions[i * 3] = x;
            galaxyPositions[i * 3 + 1] = y;
            galaxyPositions[i * 3 + 2] = z;

            const heatRatio = Math.max(0, 1 - ((r - innerHorizonLimit) / 8));
            const col = deepRed.clone().lerp(brightRed, heatRatio);
            if (heatRatio > 0.75) {
                col.lerp(pinkGlow, Math.random() * 0.35);
            }

            galaxyColors[i * 3] = col.r;
            galaxyColors[i * 3 + 1] = col.g;
            galaxyColors[i * 3 + 2] = col.b;
        }

        galaxyGeometry.setAttribute('position', new THREE.BufferAttribute(galaxyPositions, 3));
        galaxyGeometry.setAttribute('color', new THREE.BufferAttribute(galaxyColors, 3));

        const galaxyMaterial = new THREE.PointsMaterial({
            size: 0.15, 
            map: fineDustTexture,
            vertexColors: true,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const accretionDisk = new THREE.Points(galaxyGeometry, galaxyMaterial);
        scene.add(accretionDisk);

        const holeGeometry = new THREE.CircleGeometry(innerHorizonLimit - 0.05, 32);
        const holeMaterial = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });
        const blackHole = new THREE.Mesh(holeGeometry, holeMaterial);
        blackHole.rotation.x = Math.PI / 2;
        blackHole.position.y = -2.49; 
        scene.add(blackHole);

        // --- 5. ORBITING AESTHETIC TEXT ---
        function createTextTexture(text, isMainTitle = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (isMainTitle) {
                ctx.font = 'bold 30px Arial, "Malgun Gothic", "Courier New", sans-serif';
                ctx.fillStyle = '#ff2b2b'; 
                ctx.shadowColor = '#ff0000';
            } else {
                ctx.font = 'bold 24px Arial, "Malgun Gothic", "Courier New", sans-serif';
                ctx.fillStyle = '#b31e1e'; 
                ctx.shadowColor = '#3a0000';
            }
            
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowBlur = 10;
            
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            return new THREE.CanvasTexture(canvas);
        }

        const orbitGroup = new THREE.Group();
        scene.add(orbitGroup);

        const messages = [
            { text: "HAPPY BIRTHDAY 💗", isTitle: true },
            { text: "KO PAING SOE KYAW 💗", isTitle: true },
            { text: "LOVE U 💗", isTitle: false },
            { text: "SWEET HEART 💗", isTitle: false },
            { text: "SPECIAL ONE 💗", isTitle: false },
            { text: "BUBU 💗", isTitle: true },
            { text: "사랑해 💗", isTitle: true },
            { text: "남자친구 💗", isTitle: true }
        ];

        const textMeshes = [];

        messages.forEach((msg, index) => {
            const texture = createTextTexture(msg.text, msg.isTitle);
            const material = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            
            const geometry = new THREE.PlaneGeometry(8, 2.0);
            const mesh = new THREE.Mesh(geometry, material);
            
            const angle = (index / messages.length) * Math.PI * 2;
            const radius = 10.5; 
            
            mesh.position.set(Math.cos(angle) * radius, -1.8, Math.sin(angle) * radius);
            mesh.userData = { angle: angle, radius: radius, speed: 0.0025 }; 
            
            orbitGroup.add(mesh);
            textMeshes.push(mesh);
        });

        // --- 6. INTERACTIVE PANNING ---
        let mouseX = 0, mouseY = 0;
        let targetRotationX = 0, targetRotationY = 0;

        const updatePosition = (x, y) => {
            mouseX = (x / window.innerWidth) * 2 - 1;
            mouseY = -(y / window.innerHeight) * 2 + 1;
        };

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                updatePosition(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        window.addEventListener('mousemove', (e) => {
            updatePosition(e.clientX, e.clientY);
        });

        // --- 7. HEART POP INTERACTION (💗 ONLY) ---
        const handleInteraction = (clientX, clientY) => {
            // Spawns 10 gorgeous pink hearts flying in random directions on tap
            for (let i = 0; i < 10; i++) {
                const particle = document.createElement('div');
                particle.className = 'emoji-particle';
                
                // Set directly to pink heart
                particle.textContent = '💗';
                
                particle.style.left = `${clientX}px`;
                particle.style.top = `${clientY}px`;

                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 110 + 40;
                const mx = Math.cos(angle) * distance;
                const my = Math.sin(angle) * distance - 80; 
                const rot = (Math.random() - 0.5) * 140;

                particle.style.setProperty('--mx', `${mx}px`);
                particle.style.setProperty('--my', `${my}px`);
                particle.style.setProperty('--rot', `${rot}deg`);

                const randomScale = Math.random() * 0.6 + 0.7;
                particle.style.fontSize = `${22 * randomScale}px`;

                document.body.appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                }, 1400);
            }
        };

        window.addEventListener('mousedown', (e) => {
            handleInteraction(e.clientX, e.clientY);
        });

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                handleInteraction(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        // --- 8. ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            dustHeart.rotation.y = time * 0.2;
            dustHeart.position.y = 3.0 + Math.sin(time * 1.2) * 0.18;

            const pulse = 1 + Math.pow(Math.abs(Math.sin(time * 1.6)), 12) * 0.04;
            dustHeart.scale.set(pulse, pulse, pulse);

            accretionDisk.rotation.y = time * 0.12;

            textMeshes.forEach((mesh) => {
                mesh.userData.angle += mesh.userData.speed;
                mesh.position.x = Math.cos(mesh.userData.angle) * mesh.userData.radius;
                mesh.position.z = Math.sin(mesh.userData.angle) * mesh.userData.radius;
                mesh.position.y = -1.8 + Math.sin(time + mesh.userData.angle) * 0.06;
                mesh.lookAt(camera.position);
            });

            targetRotationX = mouseX * 0.2;
            targetRotationY = mouseY * 0.12;
            camera.position.x += (targetRotationX * 10 - camera.position.x) * 0.05;
            camera.position.y += (((targetRotationY * 5) + 7.5) - camera.position.y) * 0.05;
            camera.lookAt(0, 0.5, 0);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
